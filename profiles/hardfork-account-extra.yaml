# chainbench profile: hardfork-account-extra
# Account Extra bit synchronization tests (TC-4-5-*)
#
# Tests genesis init correctly unions alloc.extra bits with
# GovCouncil contract state (authorizedAddresses / blacklistedAddresses).
#
# Test accounts with Extra bits:
#   TEST_ACC_D — extra=0x4000000000000000 (bit 62: authorized)
#   TEST_ACC_E — extra=0x8000000000000000 (bit 63: blacklisted)
#   TEST_ACC_F — extra=0xc000000000000000 (bits 62+63: both)

extends: regression

genesis:
  overrides:
    alloc:
      # validators (inherited amounts)
      "0xc17d493883eaa3b4cceb0f214b273392d562f9d8": "1000000000000000000000000000"
      "0x2493a84a8f83cb87fdcbe0bb3b2d313f69a58d3c": "1000000000000000000000000000"
      "0x8c4a10b9108d49b9d23f764464090831d9c17764": "1000000000000000000000000000"
      "0x8eb79036bc0f3aba136ef18b3a2fb8c1188939a6": "1000000000000000000000000000"
      # endpoint
      "0x1e9bd59eadc3f93bc2f4f84ca8c0707f17cb17ee": "1000000000000000000000000000"
      # TEST_ACC_A-C
      "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266": "1000000000000000000000000000"
      "0x70997970C51812dc3A010C7d01b50e0d17dc79C8": "100000000000000000000"
      "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC": "1000000000000000000000000000"
      # TEST_ACC_D — bit 62 (authorized)
      "0x90F79bf6EB2c4f870365E785982E1f101E93b906":
        balance: "0xDE0B6B3A7640000"
        extra: "0x4000000000000000"
      # TEST_ACC_E — bit 63 (blacklisted)
      "0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65":
        balance: "0xDE0B6B3A7640000"
        extra: "0x8000000000000000"
      # TEST_ACC_F — bits 62+63 (both)
      "0x9965507D1a55bcC2695C58ba16FB37d819B0A4dc":
        balance: "0xDE0B6B3A7640000"
        extra: "0xc000000000000000"
    systemContracts:
      govCouncil:
        address: "0x0000000000000000000000000000000000001004"
        version: "v1"
        params:
          quorum: "2"
          expiry: "60"
          maxProposals: "3"
          memberVersion: "1"
          authorizedAddresses:
            - "0x90F79bf6EB2c4f870365E785982E1f101E93b906"
          blacklistedAddresses:
            - "0x15d34AAf54267DB7D7c367839AAf71A00a2C6A65"
